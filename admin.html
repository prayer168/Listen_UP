<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 — 教師用語擴放站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

  <header class="header">
    <div class="header-title">
      <span>⚙️</span>
      <h1>後台管理</h1>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="btn btn-nav">← 回到首頁</a>
      <span id="user-info" class="user-display"></span>
      <button id="logout-btn" class="btn btn-outline-header hidden">登出</button>
    </nav>
  </header>

  <div class="admin-layout">

    <div id="status-msg" class="status-banner" style="display:none"></div>

    <!-- Firebase config warning -->
    <div id="config-warning" class="status-banner warning" style="display:none">
      ⚠️ Firebase 尚未設定。請複製 <code>js/firebase-config.example.js</code>
      為 <code>js/firebase-config.js</code> 並填入您的 Firebase 專案設定。
    </div>

    <!-- Login section -->
    <div id="login-section" class="admin-section">
      <div class="login-area">
        <div class="login-icon">🔐</div>
        <h2>管理員登入</h2>
        <p>僅限授權管理員使用，請以指定 Google 帳號登入</p>
        <button id="login-btn" class="btn btn-google">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          使用 Google 帳號登入
        </button>
      </div>
    </div>

    <!-- Admin content section -->
    <div id="admin-section" class="admin-section" style="display:none">

      <!-- Category management -->
      <div class="admin-toolbar">
        <h2>分類管理</h2>
      </div>
      <form id="add-cat-form" class="add-form">
        <div class="form-row">
          <div class="form-group flex-2">
            <label>新增分類名稱</label>
            <input type="text" id="new-cat-name" class="form-control" placeholder="輸入分類名稱…" required>
          </div>
          <div class="form-group" style="min-width:100px">
            <label>顏色</label>
            <input type="color" id="new-cat-color" class="form-control" value="#6366F1" style="height:42px;padding:4px 6px;cursor:pointer">
          </div>
          <div class="form-group form-submit">
            <label>&nbsp;</label>
            <button type="submit" class="btn btn-primary">新增分類</button>
          </div>
        </div>
      </form>
      <div class="table-wrapper" style="margin-bottom:2rem">
        <table class="phrase-table">
          <thead>
            <tr>
              <th style="width:24px"></th>
              <th>分類名稱</th>
              <th style="width:56px">操作</th>
            </tr>
          </thead>
          <tbody id="cat-table-body">
            <tr><td colspan="3" class="loading">載入中…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Phrase management -->
      <div class="admin-toolbar">
        <h2>用語管理</h2>
        <button id="seed-btn" class="btn btn-outline-dark">⬇ 匯入預設用語</button>
      </div>

      <!-- Add form -->
      <form id="add-form" class="add-form">
        <div class="form-row">
          <div class="form-group flex-2">
            <label>新增用語文字</label>
            <input type="text" id="add-text" class="form-control"
              placeholder="輸入用語文字…" required>
          </div>
          <div class="form-group flex-1">
            <label>所屬分類</label>
            <select id="add-cat" class="form-control"></select>
          </div>
          <div class="form-group form-submit">
            <label>&nbsp;</label>
            <button type="submit" class="btn btn-primary">新增</button>
          </div>
        </div>
      </form>

      <!-- Phrase table -->
      <div class="table-wrapper">
        <table class="phrase-table">
          <thead>
            <tr>
              <th style="width:200px">分類</th>
              <th>用語文字</th>
              <th style="width:56px">操作</th>
            </tr>
          </thead>
          <tbody id="phrase-table-body">
            <tr><td colspan="3" class="loading">請先登入</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
